name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url || steps.deploy_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Retry deploy to GitHub Pages
        id: deploy_retry
        if: ${{ steps.deploy.outcome == 'failure' }}
        uses: actions/deploy-pages@v5

      - name: Fail if retry did not succeed
        if: ${{ steps.deploy.outcome == 'failure' && steps.deploy_retry.outcome == 'failure' }}
        run: |
          echo "GitHub Pages deployment failed twice."
          exit 1
